# Set a default custom join message. {NAME} will be replaced with player's name. Leave empty for default Minecraft message.
custom_join_message: ""
# Set a default prefix for all custom join messages.
custom_join_message_prefix: ""

# Set a default leave join message, {NAME} will be replaced with player's name. Leave empty for default Minecraft message.
custom_leave_message: ""
# Set a default prefix for all custom leave messages.
custom_leave_message_prefix: ""

# AFK messages require EssentialsX to be installed (they are triggered by Essentials' AFK status).
# Default AFK message for players who haven't set their own, {NAME} will be replaced with player's name.
# Leave empty for no broadcast when a player goes AFK (the built-in default is silent, mirroring
# EssentialsX's old behaviour); set a value here to announce going-AFK for everyone.
custom_afk_message: ""
# Set a default prefix for all custom AFK messages.
custom_afk_message_prefix: ""

# Default return (no-longer-AFK) message for players who haven't set their own, {NAME} will be replaced with player's name.
# Leave empty to use the built-in default ("* <name> is no longer AFK."); set a value here to override it for everyone.
custom_return_message: ""
# Set a default prefix for all custom return messages.
custom_return_message_prefix: ""

# Custom messages are stored here
saved_messages:
  join:
  leave:
  afk:
  return:

# Players who have opted out of their own AFK/return broadcast via /cm toggle.
# Entries are stored as <uuid>: true; absence means the broadcast is on (default).
silenced:
  afk:
  return:
